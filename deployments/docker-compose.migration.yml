name: vdb-guardian-migration

services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: vdb-guardian-milvus-etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    ports:
      - "${VDB_GUARDIAN_ETCD_PORT:-2379}:2379"
    volumes:
      - milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: vdb-guardian-milvus-minio
    command: minio server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${VDB_GUARDIAN_MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${VDB_GUARDIAN_MINIO_PASSWORD:-minioadmin}
    ports:
      - "${VDB_GUARDIAN_MINIO_PORT:-9000}:9000"
      - "${VDB_GUARDIAN_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - milvus-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-standalone:
    image: milvusdb/milvus:v2.5.4
    container_name: vdb-guardian-milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${VDB_GUARDIAN_MINIO_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${VDB_GUARDIAN_MINIO_PASSWORD:-minioadmin}
    ports:
      - "${VDB_GUARDIAN_MILVUS_PORT:-19530}:19530"
      - "${VDB_GUARDIAN_MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: vdb-guardian-postgres-pgvector
    environment:
      POSTGRES_DB: ${VDB_GUARDIAN_POSTGRES_DB:-vdb_guardian}
      POSTGRES_USER: ${VDB_GUARDIAN_POSTGRES_USER:-vdb_guardian}
      POSTGRES_PASSWORD: ${VDB_GUARDIAN_POSTGRES_PASSWORD:-vdb_guardian_local_password}
    ports:
      - "${VDB_GUARDIAN_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-pgvector-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
  postgres-pgvector-data:
